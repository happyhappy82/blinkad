name: Google Business Profile Review Weekly Report

on:
  # KST Friday 18:00 = UTC Friday 09:00
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-business-profile-review-weekly
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout ERP ops branch
        uses: actions/checkout@v7
        with:
          ref: erp/ops

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Authenticate to Google Cloud
        if: env.GCP_SERVICE_ACCOUNT_KEY != ''
        uses: google-github-actions/auth@v3
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Send Google Business Profile review report
        env:
          GBP_REVIEW_DATA_SOURCE: dataforseo
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          BIGQUERY_DATASET: ${{ secrets.BIGQUERY_DATASET }}
          BIGQUERY_LOCATION: ${{ secrets.BIGQUERY_LOCATION }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_GBP_MINIMAL_DAILY_METRICS_DB_ID: ${{ secrets.NOTION_GBP_MINIMAL_DAILY_METRICS_DB_ID }}
          NOTION_GBP_DAILY_SUMMARY_DB_ID: ${{ secrets.NOTION_GBP_DAILY_SUMMARY_DB_ID }}
          NOTION_GBP_MINIMAL_STORE_DB_ID: ${{ secrets.NOTION_GBP_MINIMAL_STORE_DB_ID }}
          NOTION_GBP_STORE_DB_ID: ${{ secrets.NOTION_GBP_STORE_DB_ID }}
          GOOGLE_ADS_TELEGRAM_BOT_TOKEN: ${{ secrets.GOOGLE_ADS_TELEGRAM_BOT_TOKEN }}
          GOOGLE_ADS_TELEGRAM_CHAT_ID: ${{ secrets.GOOGLE_ADS_TELEGRAM_CHAT_ID }}
        run: npm run gbp:reviews:weekly
