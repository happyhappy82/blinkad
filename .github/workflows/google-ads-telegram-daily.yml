name: Google Ads Telegram Daily Report

on:
  # KST 15:00 = UTC 06:00
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-ads-telegram-daily
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout ERP ops branch
        uses: actions/checkout@v7
        with:
          ref: erp/ops

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Send Google Ads Telegram report
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_TELEGRAM_BOT_TOKEN: ${{ secrets.GOOGLE_ADS_TELEGRAM_BOT_TOKEN }}
          GOOGLE_ADS_TELEGRAM_CHAT_ID: ${{ secrets.GOOGLE_ADS_TELEGRAM_CHAT_ID }}
        run: node scripts/google-ads-telegram-alert.mjs --daily
